services:
    # --- DATABASES ---

    mongodb:
        build: ./mongodb
        container_name: mongodb_lts
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: password123
            MONGO_INITDB_DATABASE: skates_shop
            MONGO_ROLES_DB_USER: moderator_user
            MONGO_ROLES_DB_PASSWORD: moderator_password123
            MONGO_STANDARD_DB_USER: standard_user
            MONGO_STANDARD_DB_PASSWORD: standard_password123
        ports:
            - '27017:27017'
        volumes:
            - mongo_data:/data/db
            - ./mongodb/init:/docker-entrypoint-initdb.d
        # Added healthcheck to tell other containers when it's truly ready
        healthcheck:
            test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
            interval: 2s
            timeout: 5s
            retries: 5

    mongodb-qe-init:
        image: python:3.12-slim
        depends_on:
            mongodb:
                condition: service_healthy
        working_dir: /workspace/compare_app
        environment:
            MONGO_HOST: mongodb
            MONGO_PORT: 27017
            MONGO_USERNAME: admin
            MONGO_PASSWORD: password123
            MONGO_QE_MASTER_KEY_PATH: /workspace/compare_app/.mongo_qe_master_key.bin
        volumes:
            - ./:/workspace
        command:
            - /bin/sh
            - -lc
            - pip install --no-cache-dir pymongo>=4.10.1 pymongocrypt>=1.11.0 ; python util_scripts/setup_mongodb_queryable_encryption.py --db skates_shop_encrypted

    couchdb:
        build: ./couchdb
        container_name: couchdb_lts
        environment:
            COUCHDB_USER: admin
            COUCHDB_PASSWORD: password123
        ports:
            - '5984:5984'
        volumes:
            - couchdb_data:/opt/couchdb/data
            - ./couchdb/local.d:/opt/couchdb/etc/local.d

    couchdb-init:
        image: curlimages/curl:8.12.1
        depends_on:
            - couchdb
        environment:
            COUCHDB_USER: admin
            COUCHDB_PASSWORD: password123
            COUCHDB_DB: skates_shop
            COUCHDB_DB_WITHOUT_INDEXES: skates_shop_without_indexes
            COUCHDB_DB_ROLES: skates_shop_roles
            COUCHDB_ROLES_DB_USER: moderator_user
            COUCHDB_ROLES_DB_PASSWORD: moderator_password123
            COUCHDB_STANDARD_DB_USER: standard_user
            COUCHDB_STANDARD_DB_PASSWORD: standard_password123
        volumes:
            - ./couchdb/init:/seed
        entrypoint: ['/bin/sh', '/seed/init-couchdb.sh']

    postgres_lts:
        build: ./postgres/postgres_lts
        container_name: postgres_lts
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: password123
            POSTGRES_DB: main_db
        ports:
            - '15432:5432'
        volumes:
            - pg_lts_data:/var/lib/postgresql
            - ./postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/01-init-multiple-dbs.sh
            - ./postgres/sql_dumps:/opt/sql_dumps

    postgres_11:
        build: ./postgres/postgres_11
        container_name: postgres_11_22
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: password123
            POSTGRES_DB: main_db
        ports:
            - '15433:5432'
        volumes:
            - pg_11_data:/var/lib/postgresql/data
            - ./postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/01-init-multiple-dbs.sh
            - ./postgres/sql_dumps:/opt/sql_dumps

    # --- WEB MANAGEMENT TOOLS ---

    # --- MONGO EXPRESS ---
    mongo-express:
        image: mongo-express:latest
        container_name: mongo_express
        restart: always
        ports:
            - '8081:8081'
        environment:
            # Use these specific keys to ensure the connection string is built correctly
            ME_CONFIG_MONGODB_ADMINUSERNAME: admin
            ME_CONFIG_MONGODB_ADMINPASSWORD: password123
            ME_CONFIG_MONGODB_SERVER: mongodb
            ME_CONFIG_MONGODB_PORT: 27017
            ME_CONFIG_MONGODB_ENABLE_ADMIN: 'true'
            # This is the "old school" way but often more reliable in some versions
            ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/?authSource=admin
        depends_on:
            mongodb:
                condition: service_healthy # Wait for the healthcheck to pass

    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: pgadmin_ui
        restart: always
        ports:
            - '5050:80'
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@example.com
            PGADMIN_DEFAULT_PASSWORD: password123
            # Tell pgAdmin where to look for the server definitions
            PGADMIN_CONFIG_SERVER_MODE: 'False'
        volumes:
            # Mount the server definitions
            - ./pgadmin/servers.json:/pgadmin4/servers.json
            # Create a pgpass file so you aren't prompted for passwords
            # Format: hostname:port:database:username:password
            - ./pgadmin/pgpass:/tmp/pgpass
        depends_on:
            - postgres_lts
            - postgres_11

volumes:
    mongo_data:
    couchdb_data:
    pg_lts_data:
    pg_11_data:
